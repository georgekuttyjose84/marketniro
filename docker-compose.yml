services:

  marketniro-nginx:
    image: nginx:stable
    container_name: marketniro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - marketniro-php

  marketniro-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: marketniro-php
    volumes:
      - ./:/var/www

  marketniro-mariadb:
    image: mariadb:10.11
    container_name: marketniro-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketniro
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  dbdata:
