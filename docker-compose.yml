services:

  marketniro-nginx:
    image: nginx:stable
    container_name: marketniro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - marketniro-php

  marketniro-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: marketniro-php
    volumes:
      - ./:/var/www
    environment:
      - OPENEXCHANGE_APP_ID=${OPENEXCHANGE_APP_ID}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - APP_ENV=${APP_ENV}

  marketniro-mariadb:
    image: mariadb:10.11
    container_name: marketniro-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketniro
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql

    command: >
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
      --innodb-buffer-pool-size=256M

    stop_grace_period: 30s

volumes:
  dbdata:
