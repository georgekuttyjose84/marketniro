name: Deploy MarketNiro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 159.65.146.218
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/marketniro

            echo "📥 Resetting code..."
            git fetch origin
            git reset --hard origin/main

            echo "🐳 Rebuilding containers..."
            docker compose up -d --build

            echo "⏳ Waiting for PHP container..."
            sleep 10

            echo "🧱 Running migrations..."
            docker exec marketniro-php vendor/bin/phinx migrate -e docker

            echo "📊 Migration status:"
            docker exec marketniro-php vendor/bin/phinx status -e docker

            echo "✅ Deployment complete"
