server {
    listen 80;
    server_name marketniro.local:8080 api.marketniro.local:8080;

    root /var/www/public;
    index index.php;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass marketniro-php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}

server {
    listen 443 ssl;
    server_name marketniro.com api.marketniro.com;

    ssl_certificate /etc/letsencrypt/live/marketniro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketniro.com/privkey.pem;

    root /var/www/public;
    index index.php;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass marketniro-php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
